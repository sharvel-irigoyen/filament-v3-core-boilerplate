services:
  # =========================================
  # BACKEND (PHP-FPM) - Aislado (Solo red interna)
  # =========================================
  filament-v3-php:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: filament-v3-php:dev
    container_name: filament-v3-php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=filament-v3-db
      - REDIS_HOST=filament-v3-redis
    command: >
      sh -c "
        if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist;
        fi &&
        if [ -z \"\$APP_KEY\" ]; then
          php artisan key:generate --force;
        fi &&
        php artisan storage:link || true &&
        php artisan migrate --force &&
        php-fpm
      "
    volumes:
      - ./:/var/www/filament-v3
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "9000"
    depends_on:
      filament-v3-db:
        condition: service_healthy
      filament-v3-redis:
        condition: service_started
    healthcheck:
      # Verifica que PHP-FPM esté activo Y que artisan (app + DB) funcionen correctamente
      test: ["CMD-SHELL", "php artisan about --no-interaction > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - filament-v3_net

  filament-v3-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: filament-v3-php:dev
    container_name: filament-v3-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=filament-v3-db
      - REDIS_HOST=filament-v3-redis
    # --sleep=3: espera 3s entre polls cuando no hay jobs (ahorra CPU)
    # --max-time=3600: reinicia el worker cada hora para liberar memoria
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3 --max-time=3600
    volumes:
      - ./:/var/www/filament-v3
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      filament-v3-db:
        condition: service_healthy
      filament-v3-redis:
        condition: service_started
      # Espera a que PHP-FPM esté healthy (garantiza que las migraciones ya corrieron)
      filament-v3-php:
        condition: service_healthy
    healthcheck:
      # Verifica que el proceso PID 1 (queue:work) siga vivo
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - filament-v3_net

  # =========================================
  # SIDECAR NGINX (El Portero Local)
  # =========================================
  filament-v3-nginx:
    image: nginx:alpine
    container_name: filament-v3-nginx
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www/filament-v3
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      # Espera a que PHP-FPM esté realmente healthy antes de aceptar tráfico
      filament-v3-php:
        condition: service_healthy
    healthcheck:
      # wget --spider verifica que Nginx responde sin descargar el body
      test: ["CMD-SHELL", "wget -q --spider --timeout=5 http://127.0.0.1/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - filament-v3_net
      - proxy_net

  # =========================================
  # DATA & CACHE
  # =========================================
  filament-v3-db:
    image: mysql:8.0
    container_name: filament-v3-db
    restart: unless-stopped
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-authentication-plugin=mysql_native_password"
      - "--innodb-file-per-table=1"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - on_equifax_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u${DB_USERNAME} -p${DB_PASSWORD} -h localhost --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - filament-v3_net

  filament-v3-redis:
    image: redis:7-alpine
    container_name: filament-v3-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - on_equifax_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - filament-v3_net

volumes:
  on_equifax_db_data:
  on_equifax_redis_data:

networks:
  filament-v3_net:
    driver: bridge
  proxy_net:
    external: true
    name: ${PROXY_NETWORK:-proxy_net}
