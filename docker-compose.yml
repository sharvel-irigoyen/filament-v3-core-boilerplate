services:
  # =========================================
  # BACKEND (PHP-FPM) - Aislado (Solo red interna)
  # =========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: app:dev
    container_name: ${PROJECT_NAME:-boilerplate}-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - REDIS_HOST=${REDIS_HOST:-redis}
      # - LARAVEL_PDF_DRIVER=${LARAVEL_PDF_DRIVER:-gotenberg}
      # - GOTENBERG_URL=${GOTENBERG_URL:-http://gotenberg:3000}
    command: >
      sh -c "
        if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist || echo 'Composer install failed in entrypoint (will retry in deploy.sh)';
        fi;
        if [ -f vendor/autoload.php ] && [ -z \"\$APP_KEY\" ]; then
          php artisan key:generate --force || true;
        fi;
        if [ -f vendor/autoload.php ]; then
          php artisan storage:link || true;
          php artisan migrate --force || true;
        fi;
        exec php-fpm
      "
    volumes:
      - ./:/var/www/app
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      # Verifica que PHP-FPM esté activo Y que artisan (app + DB) funcionen correctamente
      test: ["CMD-SHELL", "php artisan about --no-interaction > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: app:dev
    container_name: ${PROJECT_NAME:-boilerplate}-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - REDIS_HOST=${REDIS_HOST:-redis}
      # - LARAVEL_PDF_DRIVER=${LARAVEL_PDF_DRIVER:-gotenberg}
      # - GOTENBERG_URL=${GOTENBERG_URL:-http://gotenberg:3000}
    # --sleep=3: espera 3s entre polls cuando no hay jobs (ahorra CPU)
    # --max-time=3600: reinicia el worker cada hora para liberar memoria
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3 --max-time=3600
    volumes:
      - ./:/var/www/app
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      # Permite iniciar aunque PHP no esté healthy todavía (necesario para el primer deploy)
      app:
        condition: service_started
    healthcheck:
      # Verifica que el proceso PID 1 (queue:work) siga vivo
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app_network

  # =========================================
  # SIDECAR NGINX (El Portero Local)
  # =========================================
  web:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-boilerplate}-web
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      # Permite iniciar aunque PHP no esté healthy todavía (necesario para el primer deploy)
      app:
        condition: service_started
    healthcheck:
      # Nginx tiene su propio endpoint /health para no depender de PHP
      test: ["CMD-SHELL", "wget -q --spider --timeout=5 http://127.0.0.1/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app_network
      - proxy_net

  # =========================================
  # GOTENBERG (PDF MICROSERVICE)
  # =========================================
  # gotenberg:
  #   image: gotenberg/gotenberg:8
  #   container_name: ${PROJECT_NAME:-boilerplate}-gotenberg
  #   restart: unless-stopped
  #   command:
  #     - "gotenberg"
  #     - "--chromium-disable-routes=false"
  #   expose:
  #     - "3000"
  #   healthcheck:
  #     test: ["CMD", "curl", "--fail", "http://localhost:3000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - app_network

  # =========================================
  # DATA & CACHE
  # =========================================
  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-boilerplate}-db
    restart: unless-stopped
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-authentication-plugin=mysql_native_password"
      - "--innodb-file-per-table=1"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u${DB_USERNAME} -p${DB_PASSWORD} -h localhost --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-boilerplate}-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app_network

volumes:
  db_data:
  redis_data:

networks:
  app_network:
    driver: bridge
  proxy_net:
    external: true
    name: ${PROXY_NETWORK:-proxy_net}
