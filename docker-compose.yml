services:
  # =========================================
  # BACKEND (PHP-FPM) - Aislado (Solo red interna)
  # =========================================
  on-equifax-php:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: on-equifax-php:dev
    container_name: on-equifax-php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=on-equifax-db
      - REDIS_HOST=on-equifax-redis
    command: >
      sh -c "
        if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist;
        fi &&
        if [ -z \"\$APP_KEY\" ]; then
          php artisan key:generate --force;
        fi &&
        php artisan storage:link || true &&
        php-fpm
      "
    volumes:
      - ./:/var/www/on-equifax
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "9000"
    depends_on:
      on-equifax-db:
        condition: service_healthy
      on-equifax-redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - on-equifax_net

  on-equifax-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        user: ${DOCKER_USER:-www-data}
        uid: ${DOCKER_UID:-33}
        gid: ${DOCKER_GID:-33}
    image: on-equifax-php:dev
    container_name: on-equifax-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=on-equifax-db
      - REDIS_HOST=on-equifax-redis
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./:/var/www/on-equifax
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      on-equifax-db:
        condition: service_healthy
      on-equifax-redis:
        condition: service_started
    networks:
      - on-equifax_net

  # =========================================
  # SIDECAR NGINX (El Portero Local)
  # =========================================
  on-equifax-nginx:
    image: nginx:alpine
    container_name: on-equifax-nginx
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www/on-equifax
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - on-equifax-php
    networks:
      - on-equifax_net
      - proxy_net

  # =========================================
  # DATA & CACHE
  # =========================================
  on-equifax-db:
    image: mysql:8.0
    container_name: on-equifax-db
    restart: unless-stopped
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-authentication-plugin=mysql_native_password"
      - "--innodb-file-per-table=1"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - on_equifax_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u${DB_USERNAME} -p${DB_PASSWORD} -h localhost --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - on-equifax_net

  on-equifax-redis:
    image: redis:7-alpine
    container_name: on-equifax-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - on_equifax_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - on-equifax_net

volumes:
  on_equifax_db_data:
  on_equifax_redis_data:

networks:
  on-equifax_net:
    driver: bridge
  proxy_net:
    external: true
    name: ${PROXY_NETWORK:-proxy_net}
